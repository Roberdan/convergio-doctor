name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p convergio-mcp --tests
      - run: cargo test -p convergio-doctor --lib --tests

  release:
    needs: test
    uses: Roberdan/convergio/.github/workflows/reusable-release-rust.yml@main
    with:
      generate-sbom: true
      extra-artifacts: convergio-mcp-server
    secrets:
      PAT: ${{ secrets.PAT }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
